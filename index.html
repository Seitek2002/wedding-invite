document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  }\n\n  _onKey(e) {\n    if (this.reduce || !this._ready) return;\n    const ae = document.activeElement;\n    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'SELECT' || ae.tagName === 'TEXTAREA')) return;\n    const k = e.key;\n    let dir = 0;\n    if (k === 'ArrowDown' || k === 'PageDown' || k === ' ' || k === 'Spacebar') dir = 1;\n    else if (k === 'ArrowUp' || k === 'PageUp') dir = -1;\n    else if (k === 'Home') { e.preventDefault(); this._goTo(0); return; }\n    else if (k === 'End') { e.preventDefault(); this._goTo(this.panels.length - 1); return; }\n    else return;\n    e.preventDefault();\n    if (this._locked) return;\n    this._navigate(dir);\n  }\n\n  // ---------- 3D flow ----------\n  _tickFlow() {\n    if (!this._ready) return;\n    if (this._raf) { return; }\n    this._raf = requestAnimationFrame(() => { this._raf = 0; this._applyFlow(); });\n    this._applyFlow();\n  }\n\n  _applyFlow() {\n    if (!this.panels) return;\n    const vh = window.innerHeight || document.documentElement.clientHeight;\n    const sy = window.scrollY || window.pageYOffset || 0;\n    const p = sy / vh;\n    for (let i = 0; i < this.panels.length; i++) {\n      const pan = this.panels[i];\n      const cover = Math.min(1, Math.max(0, p - i));\n      if (cover <= 0.0002) {\n        pan.style.transform = 'translateZ(0px)';\n        pan.style.opacity = '1';\n        if (pan.__cover) pan.__cover.style.opacity = '0';\n      } else {\n        const e = cover * cover * (3 - 2 * cover); // smoothstep\n        const z = -e * 460;\n        const rx = e * 11;\n        const sc = 1 - e * 0.16;\n        const op = 1 - e * 0.55;\n        pan.style.transform = 'perspective(1400px) translateZ(' + z.toFixed(1) + 'px) rotateX(' + rx.toFixed(2) + 'deg) scale(' + sc.toFixed(3) + ')';\n        pan.style.opacity = op.toFixed(3);\n        if (pan.__cover) pan.__cover.style.opacity = (e * 0.62).toFixed(3);\n      }\n    }\n    if (this._supportsTranslate && this.depthEls) {\n      for (const d of this.depthEls) {\n        const rel = p - d.idx;\n        d.el.style.translate = '0px ' + (rel * d.speed).toFixed(1) + 'px';\n      }\n    }\n    const ai = Math.min(this.panels.length - 1, Math.max(0, Math.round(p)));\n    if (ai !== this._activeIdx) this._setActive(ai);\n    if (!this._locked && Math.abs(p - Math.round(p)) < 0.012) this._index = Math.round(p);\n  }\n\n  _setActive(ai) {\n    this._activeIdx = ai;\n    if (this.panels) this.panels.forEach((pan, i) => { pan.style.pointerEvents = (i === ai) ? 'auto' : 'none'; });\n    if (this.dots) this.dots.forEach((d, i) => {\n      const on = i === ai;\n      d.style.height = on ? '22px' : '8px';\n      d.style.borderRadius = on ? '6px' : '50%';\n      d.style.background = on ? 'var(--rose)' : 'transparent';\n      d.style.borderColor = on ? 'var(--rose)' : 'var(--line)';\n    });\n    const pan = this.panels && this.panels[ai];\n    if (pan && !pan.__revealed) {\n      pan.__revealed = true;\n      pan.querySelectorAll('[data-reveal]').forEach((el) => this._show(el));\n    }\n  }\n\n  _show(el) {\n    if (el.__shown) return;\n    el.__shown = true;\n    if (this.reduce) { el.style.opacity = '1'; el.style.transform = 'none'; el.style.filter = 'none'; return; }\n    if (el.dataset.delay) el.style.animationDelay = el.dataset.delay + 's';\n    el.classList.add('in');\n  }\n\n  _tick() {\n    if (!this.cd || !this.cd.days) return;\n    let diff = Math.floor((this.target - Date.now()) / 1000);\n    if (diff < 0) diff = 0;\n    const d = Math.floor(diff / 86400);\n    const h = Math.floor((diff % 86400) / 3600);\n    const m = Math.floor((diff % 3600) / 60);\n    const s = diff % 60;\n    const pad = (n) => String(n).padStart(2, '0');\n    this.cd.days.textContent = String(d);\n    this.cd.hours.textContent = pad(h);\n    this.cd.mins.textContent = pad(m);\n    this.cd.secs.textContent = pad(s);\n  }\n\n  // ---------- RSVP ----------\n  onAttendClick = (e) => {\n    const b = e.target.closest('[data-attend]');\n    if (!b) return;\n    const v = b.dataset.attend;\n    this._attend = v;\n    const root = this.rootEl;\n    root.querySelectorAll('[data-attend]').forEach((x) => {\n      const on = x.dataset.attend === v;\n      if (on && v === 'yes') { x.style.background = 'linear-gradient(180deg,var(--rose),#c98f88)'; x.style.color = '#1a1310'; x.style.borderColor = 'transparent'; }\n      else if (on && v === 'no') { x.style.background = 'linear-gradient(180deg,#6f6258,#574c44)'; x.style.color = '#1a1310'; x.style.borderColor = 'transparent'; }\n      else { x.style.background = 'transparent'; x.style.color = 'var(--muted)'; x.style.borderColor = 'var(--line)'; }\n    });\n    const plus = root.querySelector('[data-plusarea]');\n    const note = root.querySelector('[data-declinenote]');\n    if (v === 'no') { if (plus) plus.style.display = 'none'; if (note) note.style.display = 'block'; }\n    else { if (plus) plus.style.display = 'block'; if (note) note.style.display = 'none'; }\n  };\n\n  addGuest = () => {\n    const root = this.rootEl;\n    const wrap = root.querySelector('[data-guests]');\n    if (!wrap || wrap.children.length >= 8) return;\n    const opts = this.RELATIONS.map((r) => '<option value=\"' + r + '\">' + r + '<\u002Foption>').join('');\n    const el = document.createElement('div');\n    el.setAttribute('data-guest', '');\n    el.style.cssText = 'opacity:0;transform:translateY(10px);transition:opacity .5s var(--ease),transform .5s var(--ease);margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:14px;background:rgba(12,9,8,.4);';\n    el.innerHTML =\n      '<div style=\"display:flex;gap:10px;align-items:flex-start;\">' +\n        '<div style=\"flex:1;display:grid;gap:10px;min-width:0;\">' +\n          '<input data-gname type=\"text\" placeholder=\"ФИО гостя\" style=\"width:100%;appearance:none;background:rgba(12,9,8,.55);border:1px solid var(--line);border-radius:10px;padding:13px 14px;color:var(--ink);font:400 14px/1.2 Manrope;outline:none;\" onfocus=\"this.style.borderColor=\\'var(--rose)\\'\" onblur=\"this.style.borderColor=\\'var(--line)\\'\"/>' +\n          '<div style=\"position:relative;\">' +\n            '<select data-grel required style=\"width:100%;appearance:none;background:rgba(12,9,8,.55);border:1px solid var(--line);border-radius:10px;padding:13px 36px 13px 14px;color:var(--ink);font:400 14px/1.2 Manrope;outline:none;\">' +\n              '<option value=\"\" disabled selected hidden>Кем приходится?<\u002Foption>' + opts +\n            '<\u002Fselect>' +\n            '<span aria-hidden=\"true\" style=\"position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--gold-lt);font-size:11px;\">▾<\u002Fspan>' +\n          '<\u002Fdiv>' +\n        '<\u002Fdiv>' +\n        '<button type=\"button\" data-remove-guest aria-label=\"Убрать гостя\" style=\"flex:none;width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;\">✕<\u002Fbutton>' +\n      '<\u002Fdiv>';\n    wrap.appendChild(el);\n    const show = () => { el.style.opacity = '1'; el.style.transform = 'none'; };\n    requestAnimationFrame(show);\n    setTimeout(show, 60);\n    const inp = el.querySelector('[data-gname]');\n    if (inp) inp.focus();\n    this._updateGuestCountUI();\n  };\n\n  _updateGuestCountUI() {\n    const root = this.rootEl;\n    const wrap = root.querySelector('[data-guests]');\n    const out = root.querySelector('[data-guestcount]');\n    const addBtn = root.querySelector('[data-addbtn] span');\n    if (!wrap || !out) return;\n    const n = wrap.children.length;\n    const total = n + 1;\n    out.textContent = total > 1 ? ('Всего ' + total + ' ' + this.guestWord(total) + ', включая вас') : '';\n    if (addBtn) addBtn.textContent = n >= 8 ? 'Достигнут максимум' : (n === 0 ? 'Со мной будет ещё гость' : 'Добавить ещё одного');\n  }\n\n  onSubmit = (e) => {\n    e.preventDefault();\n    const root = this.rootEl;\n    const mainEl = root.querySelector('[data-mainname]');\n    const err = root.querySelector('[data-nameerr]');\n    const mainName = (mainEl.value || '').trim();\n    if (!mainName) { if (err) err.style.opacity = '1'; mainEl.style.borderColor = '#e08f87'; mainEl.focus(); return; }\n    if (err) err.style.opacity = '0';\n    mainEl.style.borderColor = 'var(--line)';\n    const attend = this._attend || 'yes';\n    let guests = [];\n    if (attend === 'yes') {\n      guests = Array.from(root.querySelectorAll('[data-guest]')).map((g) => ({\n        name: (g.querySelector('[data-gname]').value || '').trim(),\n        rel: (g.querySelector('[data-grel]').value || ''),\n      })).filter((g) => g.name);\n    }\n    const data = { name: mainName, attend, guests, ts: Date.now() };\n    try { localStorage.setItem('omWedRsvp', JSON.stringify(data)); } catch (_) {}\n    this._showConfirm(data);\n  };\n\n  _showConfirm(d) {\n    const root = this.rootEl;\n    const formv = root.querySelector('[data-formview]');\n    const conf = root.querySelector('[data-confirmview]');\n    const nameEl = root.querySelector('[data-confname]');\n    const msgEl = root.querySelector('[data-confmsg]');\n    const first = (d.name || '').trim().split(/\\s+/)[0] || d.name;\n    if (nameEl) nameEl.textContent = first;\n    if (msgEl) {\n      if (d.attend === 'yes') {\n        const total = 1 + (d.guests ? d.guests.length : 0);\n        msgEl.textContent = total > 1\n          ? ('Мы ждём вас и ваших близких — всего ' + total + ' ' + this.guestWord(total) + '. Будет тёплый вечер!')\n          : 'Мы очень рады! Ждём вас 4 сентября.';\n      } else { msgEl.textContent = 'Спасибо, что дали знать. Нам будет вас не хватать в этот день.'; }\n    }\n    if (formv) formv.style.display = 'none';\n    if (conf) conf.style.display = 'block';\n    if (d.attend === 'yes' && !this.reduce) this._burst();\n  }\n\n  editAnswer = () => {\n    const root = this.rootEl;\n    const formv = root.querySelector('[data-formview]');\n    const conf = root.querySelector('[data-confirmview]');\n    if (conf) conf.style.display = 'none';\n    if (formv) formv.style.display = 'block';\n  };\n\n  _restore() {\n    let raw = null;\n    try { raw = localStorage.getItem('omWedRsvp'); } catch (_) {}\n    if (!raw) return;\n    try { const d = JSON.parse(raw); if (d && d.name) { this._attend = d.attend || 'yes'; this._showConfirm(d); } } catch (_) {}\n  }\n\n  _burst() {\n    const root = this.rootEl;\n    const wrap = root.querySelector('[data-burst]');\n    if (!wrap) return;\n    const colors = ['rgba(216,166,160,.9)', 'rgba(231,215,175,.85)', 'rgba(237,200,193,.85)', 'rgba(200,167,90,.85)'];\n    for (let i = 0; i < 28; i++) {\n      const sp = document.createElement('span');\n      const size = 6 + Math.random() * 8;\n      const left = 32 + Math.random() * 36;\n      const dur = (2.6 + Math.random() * 2.2).toFixed(2);\n      const bx = ((Math.random() * 2 - 1) * 180).toFixed(0) + 'px';\n      const by = (window.innerHeight * (0.55 + Math.random() * 0.35)).toFixed(0) + 'px';\n      const br = ((Math.random() * 2 - 1) * 560).toFixed(0) + 'deg';\n      sp.style.cssText = 'position:absolute;left:' + left + '%;top:34%;width:' + size + 'px;height:' + (size + 3) + 'px;border-radius:60% 60% 60% 60%/70% 70% 40% 40%;background:' + colors[i % colors.length] + ';--bx:' + bx + ';--by:' + by + ';--br:' + br + ';animation:burst ' + dur + 's cubic-bezier(.2,.6,.3,1) forwards;';\n      wrap.appendChild(sp);\n      setTimeout(() => sp.remove(), Math.ceil(parseFloat(dur) * 1000) + 200);\n    }\n  }\n\n  // ---------- music ----------\n  toggleSound = () => { if (this.audioOn) this._stopAudio(); else this._startAudio(); };\n\n  _updateSoundUI() {\n    const root = this.rootEl;\n    const btn = root.querySelector('[data-soundbtn]');\n    if (!btn) return;\n    btn.dataset.on = this.audioOn ? '1' : '0';\n    btn.setAttribute('aria-label', this.audioOn ? 'Выключить музыку' : 'Включить музыку');\n    btn.querySelectorAll('[data-bar]').forEach((b) => { b.style.animationPlayState = this.audioOn ? 'running' : 'paused'; b.style.opacity = this.audioOn ? '1' : '.55'; });\n    const slash = root.querySelector('[data-soundslash]');\n    if (slash) slash.style.display = this.audioOn ? 'none' : 'block';\n  }\n\n  _startAudio() {\n    try {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      if (!AC) return;\n      if (!this.actx) { this.actx = new AC(); this._buildGraph(); }\n      if (this.actx.state === 'suspended') this.actx.resume();\n      this.audioOn = true;\n      const now = this.actx.currentTime;\n      this.master.gain.cancelScheduledValues(now);\n      this.master.gain.setValueAtTime(Math.max(this.master.gain.value, 0.0001), now);\n      this.master.gain.linearRampToValueAtTime(0.085, now + 2.2);\n      if (this.padGain) { this.padGain.gain.cancelScheduledValues(now); this.padGain.gain.setValueAtTime(Math.max(this.padGain.gain.value, 0.0001), now); this.padGain.gain.linearRampToValueAtTime(0.05, now + 3); }\n      this._advanceChord();\n      this._scheduleSparkle();\n      this._updateSoundUI();\n    } catch (err) { console.warn('audio start failed', err); }\n  }\n\n  _stopAudio() {\n    this.audioOn = false;\n    clearTimeout(this._noteTimer);\n    clearTimeout(this._chordTimer);\n    if (this.actx && this.master) { const now = this.actx.currentTime; this.master.gain.cancelScheduledValues(now); this.master.gain.setValueAtTime(this.master.gain.value, now); this.master.gain.linearRampToValueAtTime(0.0001, now + 1.2); }\n    this._updateSoundUI();\n  }\n\n  _buildGraph() {\n    const ctx = this.actx;\n    this.master = ctx.createGain();\n    this.master.gain.value = 0.0001;\n    const comp = ctx.createDynamicsCompressor();\n    this.master.connect(comp);\n    comp.connect(ctx.destination);\n    this.delay = ctx.createDelay(1.0);\n    this.delay.delayTime.value = 0.42;\n    this.fb = ctx.createGain();\n    this.fb.gain.value = 0.3;\n    this.dlp = ctx.createBiquadFilter();\n    this.dlp.type = 'lowpass';\n    this.dlp.frequency.value = 2000;\n    this.delay.connect(this.dlp);\n    this.dlp.connect(this.fb);\n    this.fb.connect(this.delay);\n    this.delay.connect(this.master);\n    this.wet = ctx.createGain();\n    this.wet.gain.value = 0.5;\n    this.wet.connect(this.delay);\n    this.padGain = ctx.createGain();\n    this.padGain.gain.value = 0.0001;\n    const lp = ctx.createBiquadFilter();\n    lp.type = 'lowpass';\n    lp.frequency.value = 850;\n    this.padGain.connect(lp);\n    lp.connect(this.master);\n    lp.connect(this.wet);\n    this.padOsc = [0, 1, 2].map((i) => { const o = ctx.createOscillator(); o.type = i === 2 ? 'triangle' : 'sine'; o.frequency.value = 220; o.start(); o.connect(this.padGain); return o; });\n    this._chordIndex = 0;\n  }\n\n  _advanceChord() {\n    if (!this.actx) return;\n    const chords = [[220.0, 277.18, 329.63], [196.0, 246.94, 293.66], [174.61, 220.0, 261.63], [164.81, 207.65, 246.94]];\n    const c = chords[this._chordIndex % chords.length];\n    const t = this.actx.currentTime;\n    this.padOsc.forEach((o, i) => o.frequency.setTargetAtTime(c[i], t, 1.4));\n    this._chordIndex++;\n    clearTimeout(this._chordTimer);\n    this._chordTimer = setTimeout(() => this._advanceChord(), 8500);\n  }\n\n  _scheduleSparkle() {\n    const scale = [523.25, 587.33, 659.25, 783.99, 880.0, 1046.5];\n    const play = () => {\n      if (!this.audioOn || !this.actx) return;\n      const ctx = this.actx;\n      const t = ctx.currentTime;\n      const f = scale[Math.floor(Math.random() * scale.length)];\n      const o = ctx.createOscillator();\n      o.type = 'triangle';\n      o.frequency.value = f;\n      const g = ctx.createGain();\n      g.gain.value = 0;\n      o.connect(g);\n      if (ctx.createStereoPanner) { const pan = ctx.createStereoPanner(); pan.pan.value = (Math.random() * 2 - 1) * 0.6; g.connect(pan); pan.connect(this.master); pan.connect(this.wet); }\n      else { g.connect(this.master); g.connect(this.wet); }\n      g.gain.setValueAtTime(0, t);\n      g.gain.linearRampToValueAtTime(0.11, t + 0.05);\n      g.gain.exponentialRampToValueAtTime(0.0001, t + 2.4);\n      o.start(t);\n      o.stop(t + 2.6);\n      this._noteTimer = setTimeout(play, 1900 + Math.random() * 2800);\n    };\n    clearTimeout(this._noteTimer);\n    this._noteTimer = setTimeout(play, 1400);\n  }\n\n  scrollToRsvp = () => {\n    const idx = this.panels ? this.panels.findIndex((p) => p.id === 'rsvp') : -1;\n    if (idx >= 0) { this._goTo(idx); return; }\n    const t = this.rootEl && this.rootEl.querySelector('#rsvp');\n    if (t) window.scrollTo({ top: t.getBoundingClientRect().top + (window.scrollY || 0), behavior: 'smooth' });\n  };\n\n  renderVals() {\n    return {\n      rootRef: this.rootRef,\n      toggleSound: this.toggleSound,\n      addGuest: this.addGuest,\n      onSubmit: this.onSubmit,\n      onAttendClick: this.onAttendClick,\n      editAnswer: this.editAnswer,\n      scrollToRsvp: this.scrollToRsvp,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
